# Lightweight CI: запускается на каждый PR и каждый push в main.
# Цель — гарантировать, что main всегда зелёный и release-workflow
# не упадёт на стадии test'ов.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: install
        run: npm ci

      - name: test
        run: npm test

      - name: pack (sanity)
        run: npm pack --dry-run
